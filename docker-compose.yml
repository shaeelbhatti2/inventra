services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventra
      POSTGRES_USER: inventra
      POSTGRES_PASSWORD: inventra_dev
    ports:
      - "5433:5432"
    volumes:
      - inventra_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  inventra_pg:
